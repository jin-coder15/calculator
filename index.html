<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Syed Awais Love Calculator 💖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Quicksand:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#C81C55;
    --pink:#FF8FAB;
    --plum:#6B2C5C;
    --wine:#3D0B26;
    --gold:#F5C97B;
    --cream:#FFF6F0;
    --glass:rgba(255,255,255,0.09);
    --glass-border:rgba(255,255,255,0.22);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    min-height:100vh;
    font-family:'Quicksand',sans-serif;
    color:var(--cream);
    overflow-x:hidden;
    background:linear-gradient(-45deg,#3D0B26,#6B2C5C,#C81C55,#8C2158,#4A0E2E);
    background-size:400% 400%;
    animation:gradientShift 18s ease infinite;
    position:relative;
  }

  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* ambient glow blobs */
  .glow-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .glow-blob.b1{width:380px;height:380px;background:var(--gold);top:-100px;left:-100px;animation:floatBlob 14s ease-in-out infinite;}
  .glow-blob.b2{width:420px;height:420px;background:var(--rose);bottom:-140px;right:-120px;animation:floatBlob 16s ease-in-out infinite reverse;}
  .glow-blob.b3{width:300px;height:300px;background:var(--pink);top:40%;left:50%;transform:translate(-50%,-50%);animation:floatBlob 20s ease-in-out infinite;}

  @keyframes floatBlob{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(40px,-30px) scale(1.15);}
  }

  /* custom cursor */
  .cursor-heart{
    position:fixed;
    width:22px;height:22px;
    pointer-events:none;
    z-index:9999;
    transform:translate(-50%,-50%);
    transition:transform .12s ease-out, opacity .2s;
    filter:drop-shadow(0 0 6px rgba(255,143,171,.9));
    will-change:transform;
  }
  @media (pointer:fine){
    body{cursor:none;}
    a,button,input,.clickable{cursor:none;}
  }
  @media (pointer:coarse){
    .cursor-heart{display:none;}
  }

  /* floating hearts background */
  .hearts-field{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
  .float-heart{
    position:absolute;
    bottom:-40px;
    color:rgba(255,255,255,0.55);
    opacity:0;
    animation-name:floatUp;
    animation-timing-function:ease-in;
    will-change:transform, opacity;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) translateX(0) rotate(0deg) scale(.7);opacity:0;}
    10%{opacity:.85;}
    90%{opacity:.5;}
    100%{transform:translateY(-115vh) translateX(var(--drift)) rotate(360deg) scale(1);opacity:0;}
  }

  .wrap{
    position:relative;
    z-index:2;
    max-width:640px;
    margin:0 auto;
    padding:56px 20px 40px;
  }

  header{
    text-align:center;
    margin-bottom:34px;
  }

  h1{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:clamp(1.5rem,5.5vw,2.4rem);
    letter-spacing:.5px;
    background:linear-gradient(90deg,var(--gold),var(--pink),var(--rose));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(255,143,171,.25);
    min-height:1.4em;
  }
  .type-cursor{
    display:inline-block;
    width:2px;
    background:var(--gold);
    margin-left:2px;
    animation:blink 0.9s step-end infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .subtitle{
    margin-top:10px;
    font-family:'Poppins',sans-serif;
    font-weight:400;
    font-size:clamp(.85rem,2.6vw,1rem);
    color:rgba(255,246,240,.8);
    letter-spacing:.3px;
  }

  /* glass card */
  .glass-card{
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:26px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 8px 32px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.15);
    padding:30px 26px;
    position:relative;
    overflow:hidden;
  }

  /* signature: heartbeat ECG strip */
  .pulse-strip{
    width:100%;
    height:36px;
    margin-bottom:18px;
    opacity:.85;
  }
  .pulse-strip svg{width:100%;height:100%;overflow:visible;}
  .pulse-line{
    fill:none;
    stroke:url(#pulseGrad);
    stroke-width:2.4;
    stroke-linecap:round;
    stroke-dasharray:220;
    stroke-dashoffset:220;
    animation:pulseDraw 2.6s linear infinite;
    filter:drop-shadow(0 0 6px rgba(245,201,123,.55));
  }
  @keyframes pulseDraw{
    to{stroke-dashoffset:-220;}
  }
  .pulse-strip.fast .pulse-line{animation-duration:.7s;filter:drop-shadow(0 0 10px rgba(255,143,171,.9));}

  .glow-border{
    position:absolute;
    inset:0;
    border-radius:26px;
    pointer-events:none;
    background:linear-gradient(135deg,var(--gold),transparent 30%,transparent 70%,var(--pink));
    opacity:.25;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    padding:1px;
    animation:borderSpin 6s linear infinite;
  }
  @keyframes borderSpin{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(30deg);}
  }

  .field{
    margin-bottom:18px;
  }
  .field label{
    display:block;
    font-family:'Poppins',sans-serif;
    font-size:.8rem;
    letter-spacing:.4px;
    color:var(--gold);
    margin-bottom:7px;
    font-weight:500;
  }
  .field input{
    width:100%;
    padding:13px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.07);
    color:var(--cream);
    font-family:'Quicksand',sans-serif;
    font-size:1rem;
    font-weight:500;
    outline:none;
    transition:box-shadow .25s, border-color .25s, background .25s;
  }
  .field input::placeholder{color:rgba(255,246,240,.45);}
  .field input:focus{
    border-color:var(--pink);
    box-shadow:0 0 0 3px rgba(255,143,171,.25), 0 0 18px rgba(255,143,171,.35);
    background:rgba(255,255,255,.11);
  }
  .field input.shake-error{
    animation:shake .45s ease;
    border-color:var(--rose);
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }

  .calc-btn{
    position:relative;
    width:100%;
    padding:15px 20px;
    border:none;
    border-radius:16px;
    background:linear-gradient(120deg,var(--rose),var(--plum));
    color:var(--cream);
    font-family:'Poppins',sans-serif;
    font-size:1.02rem;
    font-weight:600;
    letter-spacing:.3px;
    cursor:pointer;
    overflow:hidden;
    box-shadow:0 6px 22px rgba(200,28,85,.45);
    transition:transform .18s, box-shadow .18s;
    animation:heartbeatBtn 2.4s ease-in-out infinite;
  }
  .calc-btn:hover{
    transform:translateY(-2px) scale(1.015);
    box-shadow:0 10px 28px rgba(255,143,171,.55);
  }
  .calc-btn:active{transform:scale(.97);}
  @keyframes heartbeatBtn{
    0%,100%{box-shadow:0 6px 22px rgba(200,28,85,.45);}
    10%{transform:scale(1.015);}
    20%{transform:scale(1);}
    30%{transform:scale(1.02);}
    40%{transform:scale(1);}
  }
  .calc-btn .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.55);
    transform:scale(0);
    animation:rippleAnim .6s ease-out;
    pointer-events:none;
  }
  @keyframes rippleAnim{
    to{transform:scale(3.2);opacity:0;}
  }

  /* loading */
  .loading-box{
    margin-top:22px;
    text-align:center;
    display:none;
  }
  .loading-box.show{display:block;animation:fadeIn .4s ease;}
  .loading-text{
    font-family:'Poppins',sans-serif;
    font-size:.85rem;
    color:rgba(255,246,240,.8);
    margin-bottom:10px;
  }
  .progress-track{
    width:100%;
    height:10px;
    border-radius:8px;
    background:rgba(255,255,255,.12);
    overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%;
    width:0%;
    border-radius:8px;
    background:linear-gradient(90deg,var(--gold),var(--pink),var(--rose));
    transition:width .05s linear;
    box-shadow:0 0 12px rgba(255,143,171,.6);
  }

  /* popup */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(20,4,15,.55);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:opacity .3s;
    z-index:1000;
    padding:20px;
  }
  .overlay.active{opacity:1;visibility:visible;}
  .popup{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(22px);
    border-radius:22px;
    padding:32px 26px;
    max-width:380px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    transform:scale(.6) translateY(30px);
    opacity:0;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  }
  .overlay.active .popup{transform:scale(1) translateY(0);opacity:1;}
  .overlay.closing .popup{transform:scale(.7) translateY(20px);opacity:0;transition:transform .25s ease-in, opacity .25s;}
  .popup h2{
    font-family:'Playfair Display',serif;
    font-size:1.3rem;
    color:var(--rose);
    margin-bottom:12px;
  }
  .popup p{
    font-family:'Poppins',sans-serif;
    font-size:.92rem;
    line-height:1.6;
    color:rgba(255,246,240,.9);
    margin-bottom:20px;
  }
  .popup button{
    padding:11px 28px;
    border:none;
    border-radius:14px;
    background:linear-gradient(120deg,var(--rose),var(--plum));
    color:var(--cream);
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:.92rem;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(200,28,85,.45);
    transition:transform .18s;
  }
  .popup button:hover{transform:translateY(-2px);}

  /* result card */
  .result-card{
    margin-top:26px;
    display:none;
  }
  .result-card.show{display:block;animation:fadeIn .5s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

  .result-title{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:1.3rem;
    color:var(--gold);
    margin-bottom:16px;
    text-shadow:0 0 20px rgba(245,201,123,.4);
  }
  .names-row{
    display:flex;
    justify-content:space-between;
    font-family:'Poppins',sans-serif;
    font-size:.92rem;
    margin-bottom:6px;
    color:rgba(255,246,240,.9);
  }
  .names-row span:first-child{color:var(--pink);font-weight:600;}

  .love-meter{
    text-align:center;
    margin:22px 0 14px;
    position:relative;
  }
  .love-percent{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:clamp(2.6rem,10vw,3.6rem);
    background:linear-gradient(90deg,var(--gold),var(--pink),var(--rose));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    display:inline-block;
    position:relative;
  }
  .love-percent .beat-heart{
    display:inline-block;
    margin-left:6px;
    animation:beat 1s ease-in-out infinite;
    filter:drop-shadow(0 0 10px rgba(255,143,171,.7));
  }
  @keyframes beat{
    0%,100%{transform:scale(1);}
    25%{transform:scale(1.25);}
    40%{transform:scale(1);}
  }

  .love-message{
    text-align:center;
    font-family:'Quicksand',sans-serif;
    font-size:.98rem;
    line-height:1.6;
    color:rgba(255,246,240,.92);
    padding:0 6px;
  }

  /* music button */
  .music-btn{
    position:fixed;
    bottom:22px;
    right:22px;
    width:54px;height:54px;
    border-radius:50%;
    border:1px solid var(--glass-border);
    background:var(--glass);
    backdrop-filter:blur(14px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    cursor:pointer;
    z-index:500;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
    transition:transform .2s;
  }
  .music-btn:hover{transform:scale(1.08);}
  .music-btn.playing{animation:musicPulse 1.6s ease-in-out infinite;}
  @keyframes musicPulse{
    0%,100%{box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 0 0 rgba(255,143,171,.5);}
    50%{box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 0 10px rgba(255,143,171,0);}
  }

  footer{
    text-align:center;
    margin-top:44px;
    padding-bottom:20px;
    font-family:'Poppins',sans-serif;
    font-size:.82rem;
    color:rgba(255,246,240,.6);
    letter-spacing:.3px;
  }
  footer .heart-mini{color:var(--pink);}

  #fx-canvas{
    position:fixed;
    inset:0;
    z-index:900;
    pointer-events:none;
    display:none;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.001s !important;}
  }

  @media (max-width:420px){
    .glass-card{padding:24px 18px;}
  }
</style>
</head>
<body>

<div class="glow-blob b1"></div>
<div class="glow-blob b2"></div>
<div class="glow-blob b3"></div>
<div class="hearts-field" id="heartsField"></div>
<div class="cursor-heart" id="cursorHeart">
  <svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg">
    <path fill="#FF8FAB" d="M23.6,0c-3.4,0-6.3,2.1-7.6,5c-1.3-2.9-4.2-5-7.6-5C3.7,0,0,3.7,0,8.3c0,4.5,2.5,8,5.9,11.3C9.9,23.5,16,29,16,29
    s6.1-5.5,10.1-9.4c3.5-3.3,5.9-6.8,5.9-11.3C32,3.7,28.3,0,23.6,0z"/>
  </svg>
</div>
<canvas id="fx-canvas"></canvas>

<div class="wrap">
  <header>
    <h1 id="typedTitle"><span id="typedText"></span><span class="type-cursor" id="typeCursor"></span></h1>
    <p class="subtitle">Find your compatibility with Syed Awais ❤️</p>
  </header>

  <div class="glass-card" id="formCard">
    <div class="glow-border"></div>
    <div class="pulse-strip" id="pulseStrip">
      <svg viewBox="0 0 300 36" preserveAspectRatio="none">
        <defs>
          <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F5C97B"/>
            <stop offset="50%" stop-color="#FF8FAB"/>
            <stop offset="100%" stop-color="#C81C55"/>
          </linearGradient>
        </defs>
        <path class="pulse-line" d="M0,18 L40,18 L55,18 L65,4 L75,32 L85,10 L95,18 L140,18 L155,18 L165,4 L175,32 L185,10 L195,18 L300,18"/>
      </svg>
    </div>

    <div class="field">
      <label for="boyName">Boy Name</label>
      <input type="text" id="boyName" placeholder="Enter Boy Name" autocomplete="off" />
    </div>
    <div class="field">
      <label for="girlName">Girl Name</label>
      <input type="text" id="girlName" placeholder="Enter Girl Name" autocomplete="off" />
    </div>

    <button class="calc-btn clickable" id="calcBtn">❤️ Calculate Love ❤️</button>

    <div class="loading-box" id="loadingBox">
      <div class="loading-text">Reading the heartbeat of love...</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="glass-card result-card" id="resultCard">
    <h2 class="result-title">❤️ Love Result ❤️</h2>
    <div class="names-row"><span>Boy</span><span id="resBoy">Syed Awais</span></div>
    <div class="names-row"><span>Girl</span><span id="resGirl"></span></div>
    <div class="love-meter">
      <span class="love-percent"><span id="lovePercentNum">0</span>%<span class="beat-heart">💗</span></span>
    </div>
    <p class="love-message" id="loveMessage"></p>
  </div>

  <footer>Made with <span class="heart-mini">❤️</span> for Syed Awais</footer>
</div>

<div class="overlay" id="popupOverlay">
  <div class="popup">
    <h2>❌ Invalid Name</h2>
    <p>Sorry! ❤️<br>This Love Calculator works only for Syed Awais.<br>Please enter Syed Awais in the Boy Name field to continue.</p>
    <button id="popupOk">OK ❤️</button>
  </div>
</div>

<button class="music-btn clickable" id="musicBtn" title="Play romantic music">🎵</button>

<script>
/* ---------- Typing animation for header ---------- */
const titleFull = "💖 Syed Awais Love Calculator 💖";
const typedTextEl = document.getElementById('typedText');
let ti = 0;
function typeStep(){
  if(ti <= titleFull.length){
    typedTextEl.textContent = titleFull.slice(0, ti);
    ti++;
    setTimeout(typeStep, 55);
  } else {
    document.getElementById('typeCursor').style.animation = 'blink 0.9s step-end infinite';
  }
}
typeStep();

/* ---------- Custom cursor ---------- */
const cursorHeart = document.getElementById('cursorHeart');
window.addEventListener('mousemove', (e)=>{
  cursorHeart.style.left = e.clientX + 'px';
  cursorHeart.style.top = e.clientY + 'px';
});
window.addEventListener('mousedown', ()=> cursorHeart.style.transform = 'translate(-50%,-50%) scale(0.7)');
window.addEventListener('mouseup', ()=> cursorHeart.style.transform = 'translate(-50%,-50%) scale(1)');

/* ---------- Floating hearts background ---------- */
const heartsField = document.getElementById('heartsField');
const heartChars = ['❤️','💕','💗','💖','💘'];
function spawnFloatHeart(){
  const h = document.createElement('span');
  h.className = 'float-heart';
  h.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
  const size = 14 + Math.random()*22;
  h.style.fontSize = size + 'px';
  h.style.left = Math.random()*100 + 'vw';
  const duration = 8 + Math.random()*8;
  h.style.animationDuration = duration + 's';
  h.style.setProperty('--drift', (Math.random()*140-70) + 'px');
  heartsField.appendChild(h);
  setTimeout(()=> h.remove(), duration*1000 + 500);
}
setInterval(spawnFloatHeart, 650);
for(let i=0;i<8;i++) setTimeout(spawnFloatHeart, i*300);

/* ---------- Ripple effect ---------- */
const calcBtn = document.getElementById('calcBtn');
calcBtn.addEventListener('click', function(e){
  const rect = calcBtn.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height);
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  calcBtn.appendChild(ripple);
  ripple.addEventListener('animationend', ()=> ripple.remove());
});

/* ---------- Popup ---------- */
const popupOverlay = document.getElementById('popupOverlay');
function showPopup(){
  popupOverlay.classList.remove('closing');
  popupOverlay.classList.add('active');
}
function hidePopup(){
  popupOverlay.classList.add('closing');
  setTimeout(()=>{
    popupOverlay.classList.remove('active','closing');
  }, 260);
}
document.getElementById('popupOk').addEventListener('click', hidePopup);
popupOverlay.addEventListener('click', (e)=>{ if(e.target === popupOverlay) hidePopup(); });

/* ---------- Validation helpers ---------- */
function normalize(str){
  return str.trim().toLowerCase().replace(/\s+/g,' ');
}
function isValidBoyName(str){
  return normalize(str) === 'syed awais';
}

/* ---------- Messages ---------- */
function getLoveMessage(p){
  if(p <= 75) return "You both can build a beautiful friendship that may blossom into love. ❤️";
  if(p <= 80) return "There is a lovely connection between you two. Keep smiling together. 💖";
  if(p <= 85) return "Your hearts seem to understand each other very well. 💕";
  if(p <= 90) return "You make an adorable pair. Love is definitely in the air! ❤️";
  if(p <= 95) return "A magical bond! You are made for unforgettable moments together. 💍";
  return "Perfect Match! ❤️ You and Syed Awais are a heavenly couple. Wishing you endless happiness and love forever! 💖✨";
}

/* ---------- Main calculate flow ---------- */
const boyInput = document.getElementById('boyName');
const girlInput = document.getElementById('girlName');
const loadingBox = document.getElementById('loadingBox');
const progressFill = document.getElementById('progressFill');
const resultCard = document.getElementById('resultCard');
const pulseStrip = document.getElementById('pulseStrip');

function shakeField(el){
  el.classList.remove('shake-error');
  void el.offsetWidth;
  el.classList.add('shake-error');
  setTimeout(()=> el.classList.remove('shake-error'), 500);
}

calcBtn.addEventListener('click', ()=>{
  const boyVal = boyInput.value;
  const girlVal = girlInput.value;

  if(!isValidBoyName(boyVal)){
    showPopup();
    shakeField(boyInput);
    return;
  }
  if(normalize(girlVal) === ''){
    shakeField(girlInput);
    return;
  }

  resultCard.classList.remove('show');
  loadingBox.classList.add('show');
  pulseStrip.classList.add('fast');
  progressFill.style.width = '0%';

  const duration = 2000;
  const start = performance.now();
  function tick(now){
    const elapsed = now - start;
    const pct = Math.min(100, (elapsed/duration)*100);
    progressFill.style.width = pct + '%';
    if(elapsed < duration){
      requestAnimationFrame(tick);
    } else {
      finishCalculation(normalize(girlVal), girlVal.trim());
    }
  }
  requestAnimationFrame(tick);
});

function toTitleCase(str){
  return str.replace(/\s+/g,' ').trim().split(' ').map(w => w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}

function finishCalculation(_normGirl, girlDisplayRaw){
  loadingBox.classList.remove('show');
  pulseStrip.classList.remove('fast');

  const lovePercent = Math.floor(Math.random()*31) + 70; // 70-100 inclusive
  const message = getLoveMessage(lovePercent);
  const girlDisplay = toTitleCase(girlDisplayRaw);

  document.getElementById('resGirl').textContent = girlDisplay;
  document.getElementById('loveMessage').textContent = message;
  resultCard.classList.add('show');

  animateCount(document.getElementById('lovePercentNum'), lovePercent);

  resultCard.scrollIntoView({behavior:'smooth', block:'center'});

  if(lovePercent > 90){
    launchCelebration();
  }
}

function animateCount(el, target){
  let current = 0;
  const stepTime = 18;
  const steps = Math.max(1, Math.round(1100/stepTime));
  const inc = target/steps;
  const timer = setInterval(()=>{
    current += inc;
    if(current >= target){
      current = target;
      clearInterval(timer);
    }
    el.textContent = Math.round(current);
  }, stepTime);
}

/* ---------- Celebration: confetti / hearts / sparkles / fireworks ---------- */
const fxCanvas = document.getElementById('fx-canvas');
const fxCtx = fxCanvas.getContext('2d');
let fxParticles = [];
let fxRunning = false;
let fxSpawnTimer = null;
let fxAnimId = null;

function resizeCanvas(){
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const fxColors = ['#C81C55','#FF8FAB','#F5C97B','#6B2C5C','#FFF6F0'];

function drawHeartShape(ctx, x, y, size, color, rotation){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rotation);
  ctx.scale(size/20, size/20);
  ctx.beginPath();
  ctx.moveTo(0,4);
  ctx.bezierCurveTo(0,-2,-10,-2,-10,5);
  ctx.bezierCurveTo(-10,12,0,16,0,20);
  ctx.bezierCurveTo(0,16,10,12,10,5);
  ctx.bezierCurveTo(10,-2,0,-2,0,4);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawSparkle(ctx, x, y, size, color, rotation, alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  ctx.rotate(rotation);
  ctx.beginPath();
  for(let i=0;i<4;i++){
    ctx.moveTo(0,0);
    ctx.lineTo(size, size*0.15);
    ctx.lineTo(0,0);
    ctx.rotate(Math.PI/2);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.moveTo(-size,0); ctx.lineTo(size,0);
  ctx.moveTo(0,-size); ctx.lineTo(0,size);
  ctx.stroke();
  ctx.restore();
}

function spawnConfettiBurst(x, y, count){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*6;
    fxParticles.push({
      type: Math.random() < 0.65 ? 'heart' : 'sparkle',
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      size: 6 + Math.random()*10,
      color: fxColors[Math.floor(Math.random()*fxColors.length)],
      rotation: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.2,
      life: 0,
      maxLife: 70 + Math.random()*50,
      gravity: 0.12
    });
  }
}

function fxLoop(){
  fxCtx.clearRect(0,0,fxCanvas.width, fxCanvas.height);
  fxParticles.forEach(p=>{
    p.life++;
    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    p.rotation += p.vr;
    const alpha = Math.max(0, 1 - p.life/p.maxLife);
    if(p.type === 'heart'){
      fxCtx.globalAlpha = alpha;
      drawHeartShape(fxCtx, p.x, p.y, p.size, p.color, p.rotation);
      fxCtx.globalAlpha = 1;
    } else {
      drawSparkle(fxCtx, p.x, p.y, p.size, p.color, p.rotation, alpha);
    }
  });
  fxParticles = fxParticles.filter(p => p.life < p.maxLife);
  if(fxRunning || fxParticles.length){
    fxAnimId = requestAnimationFrame(fxLoop);
  } else {
    fxCanvas.style.display = 'none';
  }
}

function launchCelebration(){
  fxCanvas.style.display = 'block';
  fxRunning = true;
  if(fxAnimId) cancelAnimationFrame(fxAnimId);
  fxLoop();

  fxSpawnTimer = setInterval(()=>{
    const x = Math.random()*fxCanvas.width;
    const y = fxCanvas.height*0.15 + Math.random()*fxCanvas.height*0.5;
    spawnConfettiBurst(x, y, 22);
  }, 350);

  setTimeout(()=>{
    clearInterval(fxSpawnTimer);
    fxRunning = false;
  }, 5000);
}

/* ---------- Ambient romantic music (Web Audio synth) ---------- */
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];
let musicSchedTimer = null;
const musicBtn = document.getElementById('musicBtn');

const chordProgression = [
  [220.00, 277.18, 329.63], // Am
  [174.61, 220.00, 261.63], // F
  [196.00, 246.94, 293.66], // G
  [261.63, 329.63, 392.00]  // C
];

function playChord(freqs, duration){
  const now = audioCtx.currentTime;
  freqs.forEach(freq=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.05, now + 0.8);
    gain.gain.linearRampToValueAtTime(0.0, now + duration);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.1);
    musicNodes.push(osc);
  });
}

function startMusic(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  musicPlaying = true;
  musicBtn.classList.add('playing');
  musicBtn.textContent = '⏸';
  let step = 0;
  const chordDuration = 4.2;
  function scheduleNext(){
    playChord(chordProgression[step % chordProgression.length], chordDuration);
    step++;
    musicSchedTimer = setTimeout(scheduleNext, chordDuration*1000*0.9);
  }
  scheduleNext();
}

function stopMusic(){
  musicPlaying = false;
  musicBtn.classList.remove('playing');
  musicBtn.textContent = '🎵';
  if(musicSchedTimer) clearTimeout(musicSchedTimer);
  musicNodes.forEach(n=>{ try{ n.stop(); }catch(e){} });
  musicNodes = [];
}

musicBtn.addEventListener('click', ()=>{
  if(musicPlaying){ stopMusic(); } else { startMusic(); }
});
</script>
